<!-- Lightbox -->
<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <span class="lightbox-close" onclick="closeLightbox()">&times;</span>
  <img class="lightbox-img" id="lightbox-img" src="" alt="Gallery image">
  <button class="lightbox-prev" onclick="event.stopPropagation(); lightboxNav(-1)">&#8249;</button>
  <button class="lightbox-next" onclick="event.stopPropagation(); lightboxNav(1)">&#8250;</button>
</div>

<script>
  var galleryItems = document.querySelectorAll('.gallery-item');
  var lightboxIndex = 0;
  var galleryImages = Array.from(galleryItems).map(function(item) { return item.href; });
  galleryItems.forEach(function(item, index) {
    item.addEventListener('click', function(e) {
      e.preventDefault();
      lightboxIndex = index;
      openLightbox(item.href);
    });
  });
  function openLightbox(src) {
    document.getElementById('lightbox').classList.add('active');
    document.getElementById('lightbox-img').src = src;
    document.body.style.overflow = 'hidden';
  }
  function closeLightbox() {
    document.getElementById('lightbox').classList.remove('active');
    document.body.style.overflow = '';
  }
  function lightboxNav(dir) {
    lightboxIndex = (lightboxIndex + dir + galleryImages.length) % galleryImages.length;
    document.getElementById('lightbox-img').src = galleryImages[lightboxIndex];
  }
  document.addEventListener('keydown', function(e) {
    if (!document.getElementById('lightbox').classList.contains('active')) return;
    if (e.key === 'Escape') closeLightbox();
    if (e.key === 'ArrowLeft') lightboxNav(-1);
    if (e.key === 'ArrowRight') lightboxNav(1);
  });
</script>
{{ end }}
