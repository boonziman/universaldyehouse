<header class="site-header">
  <div class="header-inner">
    <a href="{{ .Site.BaseURL }}" class="logo-link">
      <img src="{{ "images/logo/logo.png" | absURL }}" alt="Universal Wash + Dye" class="logo">
    </a>
    <nav class="main-nav">
      <button class="mobile-menu-toggle" aria-label="Toggle menu">
        <span></span><span></span><span></span>
      </button>
      <ul class="nav-list">
        {{ range .Site.Menus.main }}
        <li class="nav-item{{ if $.IsMenuCurrent "main" . }} active{{ end }}">
          <a href="{{ .URL | absURL }}">{{ .Name }}</a>
        </li>
        {{ end }}
      </ul>
    </nav>
    <a href="{{ .Site.Params.instagram }}" target="_blank" class="social-link" aria-label="Instagram">
      <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <rect x="2" y="2" width="20" height="20" rx="5" ry="5"></rect>
        <circle cx="12" cy="12" r="5"></circle>
        <circle cx="17.5" cy="6.5" r="1.5" fill="currentColor" stroke="none"></circle>
      </svg>
    </a>
  </div>
</header>
