<!DOCTYPE html>
<html lang="en-US">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ if .IsHome }}UNIVERSAL GARMENT WASH &amp; DYE{{ else }}{{ .Title }} — UNIVERSAL GARMENT WASH &amp; DYE{{ end }}</title>
  <link rel="icon" type="image/x-icon" href="{{ "images/logo/favicon.ico" | absURL }}">

  <meta property="og:site_name" content="UNIVERSAL GARMENT WASH &amp; DYE">

  <link rel="stylesheet" href="{{ "css/style.css" | absURL }}">
</head>
<body>
  {{ partial "header.html" . }}

  <main>
    {{ block "main" . }}{{ end }}
  </main>

  {{ partial "footer.html" . }}
  {{ partial "scripts.html" . }}

</html>
